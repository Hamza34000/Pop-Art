<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Maquette Pop&Art</title>
    <script src="script.js"></script>
</head>
<body>

<header>
    <h1>Pop&Art</h1>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Produits</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="container">
    <!-- Carousel -->
    <div class="section">
        <h2>Nos Best-Sellers</h2>
        <div class="carousel">
            <img src="https://via.placeholder.com/1200x400/ff7f7f/333333" alt="Produit 1" class="active">
            <img src="https://via.placeholder.com/1200x400/7f7fff/333333" alt="Produit 2">
            <div class="prev">&#10094;</div>
            <div class="next">&#10095;</div>
        </div>
    </div>

    <!-- Formulaire de contact -->
    <div class="section">
        <h2>Formulaire de Contact</h2>
        <form action="3" method="POST">
            <label for="name">Nom :</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required>

            <label for="produit">Choisissez un produit :</label>
            <select id="produit" name="produit">
                <option value="Produit1">Produits 1</option>
                <option value="Produit2">Produit 2</option>
            </select>

            <label for="message">Message :</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Envoyer</button>
        </form>
    </div>
</div>

<footer>
    <p>© 2024 Pop&Art - Tous droits réservés</p>
</footer>
</body>
</html>
